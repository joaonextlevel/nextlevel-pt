<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--a:#E8FF3A;--d:#0D0D0D;--c:#161616;--b:#2A2A2A;--m:#666;--t:#F0F0F0;--red:#F44336;--green:#4CAF50;--orange:#FF9800;--blue:#2196F3;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
html,body{height:100%;background:var(--d);color:var(--t);font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column;max-width:540px;margin:0 auto}
.header{padding:10px 16px 8px;padding-top:calc(10px + var(--st));border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:var(--d);flex-shrink:0;gap:10px}
.hlogo{background:var(--a);color:var(--d);font-weight:900;font-size:9px;letter-spacing:2px;padding:4px 8px;border-radius:3px;text-transform:uppercase;white-space:nowrap}
.htitle{font-size:15px;font-weight:700;flex:1;text-align:center}
.haction{color:var(--a);font-size:14px;cursor:pointer;padding:4px;min-width:40px;text-align:right;white-space:nowrap}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.nav-bar{display:flex;border-top:1px solid var(--b);background:var(--c);padding-bottom:var(--sb);flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 0 5px;cursor:pointer;gap:2px}
.nav-icon{font-size:19px;line-height:1}
.nav-label{font-size:9px;letter-spacing:.5px;color:var(--m);text-transform:uppercase}
.nav-item.active .nav-label{color:var(--a)}
.screen{display:none;padding:14px 14px 80px;animation:fi .2s ease}
.screen.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:14px 15px;margin-bottom:10px}
.sec{font-size:9px;letter-spacing:2px;color:var(--a);text-transform:uppercase;margin:18px 0 8px;font-weight:700;border-bottom:1px solid var(--b);padding-bottom:5px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.kpi{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:13px 14px}
.kpi-l{font-size:9px;letter-spacing:1.5px;color:var(--m);text-transform:uppercase;margin-bottom:5px}
.kpi-v{font-size:30px;font-weight:900;line-height:1}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:inherit;text-align:center;transition:opacity .15s}
.btn-p{background:var(--a);color:var(--d)}
.btn-s{background:transparent;border:1px solid var(--b);color:var(--m)}
.btn-d{background:rgba(244,67,54,.15);color:#F44336;border:1px solid rgba(244,67,54,.3)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{padding:8px 14px;font-size:11px;border-radius:8px;width:auto;display:inline-block}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{margin-bottom:13px}
.fl{font-size:9px;letter-spacing:1.5px;color:var(--m);text-transform:uppercase;display:block;margin-bottom:5px}
.fi{background:var(--c);border:1px solid var(--b);border-radius:8px;color:var(--t);padding:11px 13px;font-size:14px;outline:none;width:100%;font-family:inherit;transition:border-color .2s}
.fi:focus{border-color:var(--a)}
textarea.fi{min-height:68px;resize:vertical}
select.fi{appearance:none;cursor:pointer}
.pg{display:flex;flex-wrap:wrap;gap:7px}
.pill{padding:7px 13px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--b);background:transparent;color:var(--m);user-select:none;transition:all .15s;white-space:nowrap}
.pill.on{border-color:var(--a);background:rgba(232,255,58,.1);color:var(--a)}
.li{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:13px 15px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:border-color .15s;-webkit-user-select:none}
.li:active{border-color:var(--a)}
.li-inf{flex:1;min-width:0}
.li-t{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-s{font-size:12px;color:var(--m)}
.badge{display:inline-block;padding:3px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.b-ok{background:rgba(76,175,80,.18);color:#4CAF50}
.b-no{background:rgba(244,67,54,.18);color:#F44336}
.b-pause{background:rgba(255,152,0,.18);color:#FF9800}
.b-y{background:rgba(232,255,58,.12);color:var(--a)}
.b-g{background:var(--b);color:var(--m)}
.modal{display:none;position:fixed;inset:0;z-index:100;background:var(--d);overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal.open{display:flex;flex-direction:column}
.mi{padding:14px 14px 40px;padding-top:calc(14px + var(--st));max-width:540px;width:100%;margin:0 auto}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.mb{color:var(--a);font-size:22px;cursor:pointer;padding:2px 6px;font-weight:300;line-height:1}
.mt{font-size:17px;font-weight:700;flex:1}
.search{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--t);outline:none;width:100%;font-family:inherit;margin-bottom:12px}
.search:focus{border-color:var(--a)}
.frow{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.fc{padding:6px 12px;border-radius:15px;font-size:11px;cursor:pointer;border:1px solid var(--b);white-space:nowrap;color:var(--m);background:transparent;flex-shrink:0}
.fc.on{border-color:var(--a);color:var(--a);background:rgba(232,255,58,.08)}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--a);flex-shrink:0}
.sess-row{background:var(--c);border-radius:9px;padding:10px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.sess-date{font-size:11px;color:var(--m);width:58px;flex-shrink:0}
.sess-inf{flex:1;min-width:0}
.sess-client{font-size:13px;font-weight:600}
.sess-det{font-size:11px;color:var(--m)}
.ex-card{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:12px 13px;margin-bottom:7px}
.ex-n{font-size:13px;font-weight:600;color:var(--a);margin-bottom:3px}
.ex-g{font-size:11px;color:var(--m);margin-bottom:5px}
.ex-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--b);color:var(--m)}
.tag-ok{background:rgba(76,175,80,.12);color:#4CAF50}
.tag-warn{background:rgba(255,152,0,.12);color:#FF9800}
.tag-no{background:rgba(244,67,54,.12);color:#F44336}
.tag-y{background:rgba(232,255,58,.1);color:var(--a)}
.plan-tbl{width:100%;border-collapse:collapse;margin-top:5px}
.plan-tbl th{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.8px;padding:4px 5px;text-align:left}
.plan-tbl td{font-size:12px;padding:7px 5px;border-top:1px solid var(--b);vertical-align:middle}
.plan-tbl td.num{color:var(--a);font-weight:700;text-align:center;width:28px}
.plan-tbl td.meta{color:var(--m);text-align:center;width:55px}
.plan-tbl td.nm{color:var(--t)}
.fase-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle;flex-shrink:0}
.fase-forca{background:#2E7D32}
.fase-core{background:#6A1B9A}
.fase-aq{background:#1565C0}
.fase-ret{background:#37474F}
.fase-card{background:#E65100}
.empty{text-align:center;padding:48px 16px;color:var(--m)}
.empty-i{font-size:40px;margin-bottom:10px}
.empty-t{font-size:14px;line-height:1.6}
.toast{position:fixed;bottom:calc(68px + var(--sb));left:50%;transform:translateX(-50%);background:var(--a);color:var(--d);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.fab{position:fixed;bottom:calc(68px + var(--sb));right:14px;width:50px;height:50px;background:var(--a);border:none;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(232,255,58,.3);color:var(--d);z-index:50;font-weight:700}
.alert-w{background:rgba(255,152,0,.08);border:1px solid rgba(255,152,0,.25);border-radius:8px;padding:9px 12px;font-size:12px;color:#ffcc80;margin-bottom:11px}
.stars{display:flex;gap:6px;margin-top:4px}
.star{font-size:22px;cursor:pointer;transition:opacity .1s}
hr.div{border:none;border-top:1px solid var(--b);margin:14px 0}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
@media(min-width:540px){#app{border-left:1px solid var(--b);border-right:1px solid var(--b)}.fab{right:calc(50% - 270px + 14px)}.toast{position:fixed}}
</style>
</head>

  "Ganho de massa":[],
  "Reabilitação":[{e:"Bicicleta estática leve",r:"10 min"}],
  "Mobilidade":[],
};
const SPLITS={
  2:[["peito","costas","core"],["quad","posterior","gluteos","core"]],
  3:[["peito","triceps","ombros"],["costas","biceps","core"],["quad","posterior","gluteos"]],
  4:[["peito","triceps"],["costas","biceps"],["quad","core"],["posterior","gluteos","ombros"]],
  5:[["peito","triceps"],["costas","biceps"],["quad"],["posterior","gluteos"],["ombros","core"]],
};
const EX_MAP={
  peito:["Press halteres banco plano","Press banco inclinado","Fly com halteres","Crossover em cabo","Flexões","Flexões de joelhos","Press barra banco plano"],
  costas:["Remada máquina","Remada com haltere unilateral","Puxada frontal","Remada TRX","Remada com barra","Dominadas","Remada inversa (body row)"],
  ombros:["Press halteres sentado","Elevação lateral","Face pull","Rotação externa cabo","Press militar","Wall slide"],
  biceps:["Rosca direta com halteres","Rosca martelo","Rosca com barra EZ","Rosca concentrada"],
  triceps:["Extensão tríceps cabo","Tríceps francês com haltere","Mergulho no banco","Kickback tríceps"],
  core:["Prancha frontal","Dead bug","Bird-dog","Pallof press","Prancha lateral","Hollow body hold","Russian twist"],
  quad:["Agachamento livre","Leg press 45°","Agachamento goblet","Reverse lunge","Leg extension","Lunge caminhando","Agachamento búlgaro"],
  gluteos:["Hip thrust com barra","Ponte glúteo","Ponte glúteo unilateral","Step up com halteres","Agachamento sumô"],
  posterior:["Romanian Deadlift","Stiff com halteres","Leg curl deitado","Leg curl sentado"],
};
const AVOID_L=["Agachamento búlgaro","Leg press 45°","Remada com barra","Romanian Deadlift","Stiff com halteres","Deadlift convencional"];
const AVOID_J=["Agachamento búlgaro","Lunge caminhando","Agachamento sumô","Leg extension"];
const AVOID_O=["Press militar","Press Arnold","Press barra atrás"];

function buildPlan(c){
  const nv=c.nivel==="Iniciante"?0:c.nivel==="Intermédio"?1:2;
  const dias=parseInt(c.dias)||3;
  const dur=parseInt(c.duracao)||60;
  const lims=c.limitacoes||[];
  const limL=lims.some(l=>["Hérnia lombar","Dor lombar","Ciática"].includes(l));
  const limJ=lims.includes("Joelho");
  const limO=lims.some(l=>["Ombro","Cervical"].includes(l));
  const aqK=limL?"lombar":limJ?"joelho":limO?"ombro":"geral";
  const sm={
    "Ganho de massa":{s:4,r:"8-12",d:"75s"},
    "Perda de peso":{s:3,r:"12-15",d:"45s"},
    "Tonificação":{s:3,r:"12-15",d:"60s"},
    "Reabilitação":{s:3,r:"15-20",d:"75s"},
    "Resistência":{s:4,r:"15-20",d:"45s"},
    "Performance desportiva":{s:4,r:"6-10",d:"90s"},
    "Mobilidade":{s:3,r:"12-15",d:"60s"},
  }[c.objetivo]||{s:3,r:"12-15",d:"60s"};
  const exPG=dur<=45?2:dur<=60?3:4;
  const splits=SPLITS[dias]||SPLITS[3];
  const sessions=splits.map((groups,i)=>{
    let exs=[];
    groups.forEach(g=>{
      if(g==="core"){
        ["Prancha frontal","Dead bug","Bird-dog","Pallof press","Prancha lateral"].slice(0,Math.max(2,exPG-1)).forEach(e=>{
          exs.push({fase:"core",e,s:Math.min(sm.s,3),r:"20-40s ou 10x",d:"45s"});
        });
      } else {
        let lst=(EX_MAP[g]||[]).filter(e=>{
          if(limL&&AVOID_L.includes(e))return false;
          if(limJ&&AVOID_J.includes(e))return false;
          if(limO&&AVOID_O.includes(e))return false;
          if(nv===0&&["Dominadas","Press militar","Agachamento búlgaro","Remada com barra"].includes(e))return false;
          return true;
        });
        lst.slice(0,exPG).forEach(e=>{
          const ex=EX.find(x=>x[0]===e);
          exs.push({fase:"forca",e,s:sm.s,r:ex?ex[5]:sm.r,d:ex?ex[6]:sm.d});
        });
      }
    });
    return{nome:`Sessão ${String.fromCharCode(65+i)}`,grupos:groups.map(g=>({peito:"Peito",costas:"Costas",ombros:"Ombros",biceps:"Bíceps",triceps:"Tríceps",core:"Core",quad:"Quadricípites",gluteos:"Glúteos",posterior:"Posterior"})[g]||g).join(" + "),exs};
  });
  const cardio=CARDIO_DB[c.objetivo]||[];
  const prog={
    "Ganho de massa":["Sem.1: Técnica e adaptação","Sem.2: +5% carga, manter reps","Sem.3: Sobrecarga progressiva","Sem.4: Deload — 60% carga"],
    "Perda de peso":["Sem.1: Adaptar ritmo e circuito","Sem.2: +2min cardio, -5s descanso","Sem.3: Subir carga 5-10%","Sem.4: Circuit sem pausas"],
    "Reabilitação":["Sem.1: Amplitude parcial","Sem.2: Amplitude completa, carga zero","Sem.3: Introduzir carga leve","Sem.4: Reavaliar — escala 0-10"],
    "Tonificação":["Sem.1: Padrões base 3 séries","Sem.2: 3 séries completas","Sem.3: +1 série nos principais","Sem.4: Supersets nos complementares"],
    "Resistência":["Sem.1: Volume base","Sem.2: +1 série por exercício","Sem.3: -10s descanso","Sem.4: Circuit training"],
    "Performance desportiva":["Sem.1: Técnica máxima","Sem.2: Velocidade concêntrica","Sem.3: Carga + explosividade","Sem.4: Especificidade desportiva"],
    "Mobilidade":["Sem.1: Amplitude controlada","Sem.2: +5s por posição","Sem.3: Cargas leves de alavanca","Sem.4: Fluxo dinâmico"],
  }[c.objetivo]||["Sem.1-2: Adaptação","Sem.3: Progressão","Sem.4: Deload"];
  const alerts=[];
  if(limL)alerts.push("⚠️ Lombar: ativar core antes de cada exercício de carga. Parar se desconforto >4/10.");
  if(limJ)alerts.push("⚠️ Joelho: evitar flexão >90° com carga. Foam roller quadricípites pós-treino.");
  if(limO)alerts.push("⚠️ Ombro/Cervical: priorizar rotadores externos. Sem press atrás da nuca.");
  if(lims.includes("Hipertensão"))alerts.push("⚠️ Hipertensão: evitar Valsalva. Descansos mínimos 60s.");
  return{client:c,aq:AQ[aqK],mob:MOB[aqK],sessions,cardio,prog,alerts,createdAt:new Date().toLocaleDateString('pt-PT')};
}

    createdAt:existId?(cl.find(x=>x.id===existId)||{}).createdAt:new Date().toLocaleDateString('pt-PT'),
  };

function copyPlan(pid){
  const pr=S.plans().find(p=>p.id===pid);if(!pr)return;
  const p=pr.plan;
  let t=`🏋️ NEXT LEVEL PT — ${p.client.nome}\n`;
  t+=`${p.client.objetivo} · ${p.client.nivel} · ${p.client.dias}×/sem · ${p.client.duracao}min\n\n`;
  t+=`🔥 AQUECIMENTO\n${p.aq.join('\n')}\n\n`;
  p.sessions.forEach(s=>{t+=`━━ ${s.nome.toUpperCase()} — ${s.grupos} ━━\n`;s.exs.forEach(e=>t+=`• ${e.e}: ${e.s}× ${e.r} (desc. ${e.d})\n`);t+='\n';});
  if(p.cardio.length){t+=`🚴 CARDIO\n`;p.cardio.forEach(e=>t+=`• ${e.e}: ${e.r}\n`);t+='\n';}
  t+=`🧘 RETORNO\n${p.mob.join('\n')}\n\n`;
  t+=`📈 PROGRESSÃO\n${p.prog.join('\n')}`;
  navigator.clipboard.writeText(t).then(()=>toast('Copiado! ✓')).catch(()=>toast('Usa o botão "selecionar tudo" manualmente'));
}

let exF='all';
function rExercicios(){
  document.getElementById('htitle').textContent='Biblioteca';

  document.getElementById('s-exercicios').innerHTML=`
    <input class="search" placeholder="🔍  Pesquisar exercício..." id="exsearch" oninput="fEx()">
    <div class="frow" id="exfrow">
      <div class="fc on" onclick="setExF('all',this)">Todos (${EX.length})</div>
      ${cats.map(c=>`<div class="fc" onclick="setExF('${c}',this)">${c}</div>`).join('')}
    </div>
    <div id="exlist">${rExList(EX)}</div>
  `;
}
function setExF(f,el){
  exF=f;
  document.querySelectorAll('#exfrow .fc').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');fEx();
}
function fEx(){
  const q=(document.getElementById('exsearch')||{value:''}).value.toLowerCase();
  let lst=EX;
  if(q)lst=lst.filter(e=>e[0].toLowerCase().includes(q)||e[1].toLowerCase().includes(q)||e[2].toLowerCase().includes(q));
  if(exF!=='all'){
    lst=lst.filter(e=>{
      const g=e[1];
      if(exF==='Membros Inf.')return/Quadricípites|Glúteos|Isquiotibiais|Panturrilha|Posterior|Adutores/.test(g);
      if(exF==='Membros Sup.')return/Peito|Costas|Ombros|Bíceps|Tríceps|Deltóide|Dorsal|Trapézio|Rotadores/.test(g);
      if(exF==='Core')return/Core/.test(g);
      if(exF==='Cardio')return/Cardio|Full body|Kettlebell/.test(g);
      if(exF==='Mobilidade')return/Mobilidade|Recuperação|Libertação|Ativação/.test(g);
      return true;
    });
  }
  document.getElementById('exlist').innerHTML=rExList(lst);
}
function tClass(v){
  if(!v)return'tag';
  if(v.includes('✓')&&!v.includes('⚠️')&&!v.includes('✗'))return'tag tag-ok';
  if(v.includes('⚠️'))return'tag tag-warn';
  if(v.includes('✗'))return'tag tag-no';
  return'tag';
}
function rExList(lst){
  if(!lst.length)return`<div class="empty"><div class="empty-t">Nenhum exercício encontrado.</div></div>`;
  return lst.map(e=>`
    <div class="ex-card">
      <div class="ex-n">${esc(e[0])}</div>
      <div class="ex-g">${esc(e[1])}</div>
      <div class="ex-tags">
        <span class="tag">${esc(e[2])}</span>
        <span class="tag tag-y">${esc(e[3])}</span>
        <span class="tag">${esc(e[4])} séries</span>
        <span class="tag">${esc(e[5])}</span>
        <span class="tag">${esc(e[6])} descanso</span>
        <span class="${tClass(e[7])}">L: ${esc((e[7]||'').slice(0,18))}</span>
        <span class="${tClass(e[8])}">J: ${esc((e[8]||'').slice(0,18))}</span>
