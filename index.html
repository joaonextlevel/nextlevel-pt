<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0D0D0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NL PT">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Next Level PT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--a:#E8FF3A;--d:#0D0D0D;--c:#161616;--b:#2A2A2A;--m:#666;--t:#F0F0F0;--red:#F44336;--green:#4CAF50;--orange:#FF9800;--blue:#2196F3;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
html,body{height:100%;background:var(--d);color:var(--t);font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column;max-width:540px;margin:0 auto}
.header{padding:10px 16px 8px;padding-top:calc(10px + var(--st));border-bottom:1px solid var(--b);display:flex;align-items:center;background:var(--d);flex-shrink:0;gap:10px}
.hlogo{background:var(--a);color:var(--d);font-weight:900;font-size:9px;letter-spacing:2px;padding:4px 8px;border-radius:3px;text-transform:uppercase;white-space:nowrap}
.htitle{font-size:15px;font-weight:700;flex:1;text-align:center}
.hbtn{color:var(--a);font-size:13px;cursor:pointer;padding:4px 2px;white-space:nowrap;background:none;border:none;font-family:inherit}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.nav-bar{display:flex;border-top:1px solid var(--b);background:var(--c);padding-bottom:var(--sb);flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 0 5px;cursor:pointer;gap:2px}
.nav-icon{font-size:18px;line-height:1}
.nav-label{font-size:9px;letter-spacing:.5px;color:var(--m);text-transform:uppercase}
.nav-item.active .nav-label{color:var(--a)}
.screen{display:none;padding:14px 14px 80px}
.screen.active{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:14px 15px;margin-bottom:10px}
.sec{font-size:9px;letter-spacing:2px;color:var(--a);text-transform:uppercase;margin:18px 0 8px;font-weight:700;border-bottom:1px solid var(--b);padding-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.li{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:11px;-webkit-user-select:none;transition:border-color .12s}
.li:active{border-color:var(--a)}
.li-inf{flex:1;min-width:0}
.li-t{font-size:14px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-s{font-size:12px;color:var(--m)}
.fg{margin-bottom:12px}
.fl{font-size:9px;letter-spacing:1.5px;color:var(--m);text-transform:uppercase;display:block;margin-bottom:5px}
.fi{background:var(--c);border:1px solid var(--b);border-radius:8px;color:var(--t);padding:11px 13px;font-size:14px;outline:none;width:100%;font-family:inherit;transition:border-color .18s}
.fi:focus{border-color:var(--a)}
.fi-sm{padding:7px 10px;font-size:13px}
textarea.fi{min-height:64px;resize:vertical}
select.fi{appearance:none;cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pg{display:flex;flex-wrap:wrap;gap:7px}
.pill{padding:7px 13px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--b);background:transparent;color:var(--m);user-select:none;transition:all .12s;white-space:nowrap}
.pill.on{border-color:var(--a);background:rgba(232,255,58,.1);color:var(--a)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:inherit;text-align:center}
.btn-p{background:var(--a);color:var(--d)}
.btn-s{background:transparent;border:1px solid var(--b);color:var(--m)}
.btn-d{background:rgba(244,67,54,.1);color:var(--red);border:1px solid rgba(244,67,54,.25)}
.btn-sm{padding:7px 12px;font-size:11px;border-radius:7px;width:auto;display:inline-block;letter-spacing:.5px}
.badge{display:inline-block;padding:3px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.b-ok{background:rgba(76,175,80,.15);color:var(--green)}
.b-no{background:rgba(244,67,54,.15);color:var(--red)}
.b-y{background:rgba(232,255,58,.1);color:var(--a)}
.b-g{background:var(--b);color:var(--m)}
.b-or{background:rgba(255,152,0,.12);color:var(--orange)}
.modal{display:none;position:fixed;inset:0;z-index:100;background:var(--d);overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal.open{display:flex;flex-direction:column}
.mi{padding:14px 14px 50px;padding-top:calc(14px + var(--st));max-width:540px;width:100%;margin:0 auto}
.mh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mb{color:var(--a);font-size:22px;cursor:pointer;padding:2px 6px;font-weight:300;line-height:1}
.mt{font-size:17px;font-weight:700;flex:1}
.search{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:10px 13px;font-size:14px;color:var(--t);outline:none;width:100%;font-family:inherit;margin-bottom:10px}
.search:focus{border-color:var(--a)}
.frow{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;margin-bottom:10px;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.fc{padding:6px 12px;border-radius:15px;font-size:11px;cursor:pointer;border:1px solid var(--b);white-space:nowrap;color:var(--m);background:transparent;flex-shrink:0}
.fc.on{border-color:var(--a);color:var(--a);background:rgba(232,255,58,.07)}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--a);flex-shrink:0}

/* Plan Builder */
.sess-block{background:var(--c);border:1px solid var(--b);border-radius:12px;margin-bottom:12px}
.sess-hd{padding:12px 14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--b)}
.sess-nm{font-size:14px;font-weight:700;flex:1;background:none;border:none;color:var(--t);font-family:inherit;outline:none;padding:0}
.sess-nm:focus{color:var(--a)}
.sess-bd{padding:12px 14px}
.ex-row{background:var(--d);border:1px solid var(--b);border-radius:8px;margin-bottom:7px}
.ex-hd{padding:9px 12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.ex-nm{font-size:13px;font-weight:600;flex:1;color:var(--t)}
.ex-meta{font-size:10px;color:var(--m)}
.ex-bd{padding:10px 12px;border-top:1px solid var(--b);display:none}
.ex-row.open .ex-bd{display:block}
.ex-row.open .ex-hd{border-bottom:1px solid var(--b)}
.ex-actions{display:flex;gap:7px;margin-top:9px}

/* Load tracking */
.load-row{background:var(--d);border:1px solid var(--b);border-radius:8px;padding:10px 12px;margin-bottom:7px}
.load-nm{font-size:13px;font-weight:600;margin-bottom:7px;color:var(--t)}
.load-ref{font-size:11px;color:var(--m);margin-bottom:6px}

/* AI */
.ai-card{background:rgba(232,255,58,.04);border:1px solid rgba(232,255,58,.18);border-radius:10px;padding:12px;margin-bottom:8px}
.ai-nm{font-size:13px;font-weight:700;color:var(--a);margin-bottom:2px}
.ai-meta{font-size:11px;color:var(--m);margin-bottom:4px}
.ai-why{font-size:12px;color:#aaa;font-style:italic;margin-bottom:8px;line-height:1.5}
.spinner{width:18px;height:18px;border:2px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Chart */
.chart-wrap{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:12px;margin-bottom:10px}
.chart-label{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.chart-val{font-size:26px;font-weight:800;color:var(--a)}
.chart-sub{font-size:11px;color:var(--m);margin-bottom:8px}

/* Misc */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.kpi{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:12px 13px}
.kpi-l{font-size:9px;letter-spacing:1.5px;color:var(--m);text-transform:uppercase;margin-bottom:4px}
.kpi-v{font-size:28px;font-weight:900;line-height:1}
.empty{text-align:center;padding:44px 16px;color:var(--m)}
.empty-i{font-size:36px;margin-bottom:8px}
.empty-t{font-size:14px;line-height:1.6}
.alert-w{background:rgba(255,152,0,.07);border:1px solid rgba(255,152,0,.22);border-radius:8px;padding:9px 12px;font-size:12px;color:#ffcc80;margin-bottom:10px}
.divider{border:none;border-top:1px solid var(--b);margin:12px 0}
.toast{position:fixed;bottom:calc(68px + var(--sb));left:50%;transform:translateX(-50%);background:var(--a);color:var(--d);padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .18s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.fab{position:fixed;bottom:calc(68px + var(--sb));right:14px;width:50px;height:50px;background:var(--a);border:none;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(232,255,58,.28);color:var(--d);z-index:50;font-weight:700}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
@media(min-width:540px){#app{border-left:1px solid var(--b);border-right:1px solid var(--b)}.fab{right:calc(50% - 270px + 14px)}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="hlogo">NL PT</div>

<div class="modal" id="m-client"></div>

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const gid=()=>'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtD=d=>{if(!d)return'\u2014';const p=d.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d};
const init2=n=>(n||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
let CS='clientes';

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}
function openM(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden'}
function closeM(id){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}
function selP(gid,hidId,el){
  document.querySelectorAll('#'+gid+' .pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById(hidId).value=el.dataset.v;
}
function badgeEst(e){
  const c=e==='Ativo'?'b-ok':e==='Inativo'?'b-no':'b-or';
  return`<span class="badge ${c}">${esc(e)}</span>`;
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function go(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('s-'+screen).classList.add('active');
  document.querySelector('[data-s="'+screen+'"]').classList.add('active');
  CS=screen;
  const fab=document.getElementById('_fab');if(fab)fab.remove();
  ({clientes:rClientes,planos:rPlanos,sessoes:rSessoes,evolucao:rEvolucao,biblioteca:rBiblioteca})[screen]();
  document.getElementById('htitle').textContent=
    {clientes:'Clientes',planos:'Planos de Treino',sessoes:'Sess\xf5es',evolucao:'Evolu\xe7\xe3o',biblioteca:'Biblioteca'}[screen];
}

function addFab(cb){
  const f=document.createElement('button');
  f.id='_fab';f.className='fab';f.textContent='+';f.onclick=cb;
  document.getElementById('app').appendChild(f);
}

// ─── CLIENTES ─────────────────────────────────────────────────────────────────
function rAlerts(){
  const alerts=getStagnationAlerts();
  if(!alerts.length)return'';
  return`<div class="sec" style="margin-top:0">&#9888;&#65039; Alertas de Progress\xe3o</div>`+
    alerts.map(a=>`<div class="alert-w" style="cursor:pointer" onclick="go('evolucao');setTimeout(()=>{document.getElementById('evcl').value='${a.clientId}';evLoadClient('${a.clientId}');},100)">

function saveClient(eid){
  const name=document.getElementById('fn').value.trim();
  if(!name){toast('Nome obrigat\xf3rio');return}
  const cl=S.clients();
  const lims=[...document.querySelectorAll('#pg-lm .pill.on')].map(p=>p.dataset.v);
  const now=new Date().toLocaleDateString('pt-PT');
  const c={
    id:eid||gid(),name,
    age:document.getElementById('fi2').value,
    contact:document.getElementById('fc').value,
    weight:document.getElementById('fw').value,
    height:document.getElementById('fh').value,
    bodyFat:document.getElementById('fbf').value,
    state:document.getElementById('fst').value||'Ativo',
    objective:document.getElementById('fob').value,
    level:document.getElementById('fnv').value,
    frequency:document.getElementById('fdi').value,
    duration:document.getElementById('fdu').value,
    limitations:lims,
    notes:document.getElementById('fno').value,
    createdAt:eid?(cl.find(x=>x.id===eid)||{}).createdAt||now:now,
    measurements:(eid?(cl.find(x=>x.id===eid)||{}).measurements:null)||[],
  };
  if(eid){const i=cl.findIndex(x=>x.id===eid);i>=0?cl[i]=c:cl.push(c)}else cl.push(c);
  S.sc(cl);closeM('m-client');
  toast(eid?'Atualizado \u2713':'Cliente adicionado \u2713');
  if(CS==='clientes')rClientes();
}

function delClient(id){
  if(!confirm('Eliminar este cliente?'))return;
  S.sc(S.clients().filter(c=>c.id!==id));
  S.sp(S.plans().filter(p=>p.clientId!==id));
  S.ss(S.sessions().filter(s=>s.clientId!==id));
  closeM('m-client');toast('Eliminado');rClientes();
}

function saveNote(cid){
  const text=(document.getElementById('ntext')||{value:''}).value.trim();
  if(!text){toast('Escreve algo primeiro');return}
  const cl=S.clients();
  const i=cl.findIndex(x=>x.id===cid);if(i<0)return;
  if(!cl[i].quickNotes)cl[i].quickNotes=[];
  cl[i].quickNotes.push({date:new Date().toLocaleDateString('pt-PT'),text});
  S.sc(cl);closeM('m-note');
  toast('Nota guardada \u2713');
}

function saveMeasure(cid){
  const cl=S.clients();
  const i=cl.findIndex(x=>x.id===cid);if(i<0)return;
  const m={
    date:document.getElementById('md').value,
    weight:document.getElementById('mw').value,
    bodyFat:document.getElementById('mbf').value,
    waist:document.getElementById('mwa').value,
    hip:document.getElementById('mhi').value,
    notes:document.getElementById('mno').value,
  };
  if(!cl[i].measurements)cl[i].measurements=[];
  cl[i].measurements.push(m);
  if(m.weight)cl[i].weight=m.weight;
  if(m.bodyFat)cl[i].bodyFat=m.bodyFat;
  S.sc(cl);closeM('m-measure');toast('Medidas guardadas \u2713');
}

      if(cat==='ms')return/Peito|Costa|Ombro|B\xedceps|Tr\xedceps|Dorsal|Delt/.test(g);
      if(cat==='core')return/Core/.test(g);
      if(cat==='card')return/Cardio|Full body|Kettlebell/.test(g);

async function fetchAI(sid,si){
  const apiKey=S.apiKey();
  const btn=document.getElementById('aibtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> A pensar...';}
  const cl=S.clients().find(x=>x.id===((document.getElementById('pcl')||{value:CP.clientId}).value||CP.clientId));
  const sess=CP.sessions.find(s=>s.id===sid);
  const tipo=document.getElementById('faiq').value;
  const ctx=(document.getElementById('faic')||{value:''}).value;
  const currentEx=sess?sess.exercises.map(e=>e.name).join(', '):'(nenhum ainda)';
  const prompt=`Perfil do cliente:
- Nome: ${cl?cl.name:'desconhecido'}
- Objetivo: ${cl?cl.objective:'n/d'}
- N\xedvel: ${cl?cl.level:'n/d'}
- Limita\xe7\xf5es: ${cl&&cl.limitations&&cl.limitations.length?cl.limitations.join(', '):'nenhuma'}
- Frequ\xeancia: ${cl?cl.frequency:3}x/semana

Sess\xe3o atual j\xe1 tem: ${currentEx}

Tipo de pedido: ${tipo==='geral'?'Sugere 4-5 exerc\xedcios adequados para esta sess\xe3o':tipo==='patologia'?'Sugere adapta\xe7\xf5es e exerc\xedcios seguros para as limita\xe7\xf5es do cliente':'Sugere como progredir os exerc\xedcios atuais nas pr\xf3ximas semanas'}
${ctx?'Contexto extra: '+ctx:''}

Responde APENAS com JSON v\xe1lido, sem texto extra, sem markdown. Formato:
[{"nome":"nome do exercicio","series":"3","reps":"10-12","rest":"60s","justificacao":"breve justificacao em pt-PT"}]`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1000,
        system:'Responds apenas em portugu\xeas de Portugal. \xc9s um personal trainer especialista. Responde SEMPRE com JSON puro v\xe1lido, sem markdown, sem texto antes ou depois.',
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await resp.json();
    if(data.error){throw new Error(data.error.message)}
    const text=data.content[0].text.replace(/```json|```/g,'').trim();
    const suggestions=JSON.parse(text);
    const res=document.getElementById('ai-results');
    if(res){
      res.innerHTML=`<div class="sec" style="margin-top:0">Sugest\xf5es (toca + para adicionar)</div>`+
        suggestions.map(s=>`<div class="ai-card">
          <div class="ai-nm">${esc(s.nome)}</div>
          <div class="ai-meta">${esc(s.series)} s\xe9ries \xb7 ${esc(s.reps)} \xb7 ${esc(s.rest)} descanso</div>
          <div class="ai-why">${esc(s.justificacao)}</div>
          <button class="btn btn-sm btn-p" onclick="addAISugg('${sid}',${si},${JSON.stringify(s.nome).replace(/</g,'\\u003c')})">+ Adicionar ao plano</button>
        </div>`).join('');
    }
  }catch(err){
    const res=document.getElementById('ai-results');
    if(res)res.innerHTML=`<div class="alert-w">Erro: ${esc(err.message)}.<br>Verifica a API key nas Defini\xe7\xf5es.</div>`;
  }finally{
    const b=document.getElementById('aibtn');
    if(b){b.disabled=false;b.innerHTML='&#129302; Pedir Sugest\xf5es de novo';}
  }
}

function addAISugg(sid,si,name){
  const ex=EX.find(e=>e[0]===name)||[name,'\u2014','\u2014'];
  // Add to CP data
  const s=CP.sessions.find(s=>s.id===sid);
  if(!s){toast('Erro: sess\xe3o n\xe3o encontrada');return}
  const e={id:gid(),name:ex[0],group:ex[1],equipment:ex[2],series:'3',reps:'10-12',rest:'60s',notes:''};
  s.exercises.push(e);
  // Close AI modal and refresh plan builder
  closeM('m-ai');
  // Rebuild the session block in the plan builder
  const sb=document.getElementById('sb-'+sid);
  if(sb){
    const newDiv=document.createElement('div');
    newDiv.innerHTML=renderSessBlock(s,si);
    sb.parentNode.replaceChild(newDiv.firstChild,sb);
  }
  toast(name+' adicionado ao plano \u2713');
}

function getStagnationAlerts(){
  const cl=S.clients();
  const ses=S.sessions();
  const alerts=[];
  cl.filter(c=>c.state==='Ativo'||!c.state).forEach(c=>{
    const cSes=ses.filter(s=>s.clientId===c.id&&s.loads&&s.loads.length).sort((a,b)=>a.date.localeCompare(b.date));
    // Group loads by exercise
    const exMap={};
    cSes.forEach(s=>s.loads.forEach(l=>{
      if(!l.load)return;
      if(!exMap[l.exerciseName])exMap[l.exerciseName]=[];
      exMap[l.exerciseName].push({date:s.date,load:parseFloat(l.load)});
    }));
    Object.entries(exMap).forEach(([ex,pts])=>{
      if(pts.length<3)return;
      const last3=pts.slice(-3);
      const allSame=last3.every(p=>p.load===last3[0].load);
      if(allSame){
        alerts.push({clientId:c.id,clientName:c.name,exercise:ex,load:last3[0].load,sessions:last3.length,lastDate:last3[last3.length-1].date});
      }
    });
  });
  return alerts;
}

function evLoadEx(name,cid){
  _evExercise=name;
  if(!name){document.getElementById('ev-ex-chart').innerHTML='';return}
  const ses=S.sessions().filter(s=>s.clientId===cid).sort((a,b)=>a.date.localeCompare(b.date));
  const pts=[];
  ses.forEach(s=>{if(s.loads)s.loads.forEach(l=>{if(l.exerciseName===name&&l.load)pts.push({date:s.date,val:parseFloat(l.load)});});});
  if(!pts.length){document.getElementById('ev-ex-chart').innerHTML='<div style="font-size:12px;color:var(--m)">Sem dados ainda.</div>';return}
  document.getElementById('ev-ex-chart').innerHTML=renderSparkline(pts,'kg','var(--a)');
}

function renderSparkline(pts,unit,color){
  if(!pts||pts.length<2)return pts&&pts.length===1?`<div class="chart-wrap"><div class="chart-label">${pts[0].date}</div><div class="chart-val">${pts[0].val}${unit}</div></div>`:'';
  const vals=pts.map(p=>p.val);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const last=vals[vals.length-1],first=vals[0];
  const diff=last-first;
  const w=300,h=60,pad=6;
  const px=(i)=>pad+(i/(pts.length-1))*(w-2*pad);
  const py=(v)=>h-pad-(mx===mn?h/2:(v-mn)/(mx-mn)*(h-2*pad));
  const pathD=pts.map((p,i)=>(i===0?'M':'L')+px(i).toFixed(1)+','+py(p.val).toFixed(1)).join(' ');
  return`<div class="chart-wrap">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px">
      <div><div class="chart-val">${last}${unit}</div><div class="chart-sub">${pts[pts.length-1].date}</div></div>
      <div style="text-align:right"><div style="font-size:13px;font-weight:700;color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${diff.toFixed(1)}${unit}</div><div class="chart-sub">vs. in\xedcio</div></div>
    </div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;overflow:visible">
      <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${pts.map((p,i)=>`<circle cx="${px(i).toFixed(1)}" cy="${py(p.val).toFixed(1)}" r="3" fill="${color}"/>`).join('')}
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--m);margin-top:2px"><span>${pts[0].date}</span><span>${pts[pts.length-1].date}</span></div>
  </div>`;
}

function renderLib(q,cat){
  const cx=customEx();
  let lst=cat==='custom'?cx.map(e=>[e.name,e.group,e.equipment||'\u2014',e.id]):allEx();
  if(q)lst=lst.filter(e=>e[0].toLowerCase().includes(q.toLowerCase())||e[1].toLowerCase().includes(q.toLowerCase()));
  if(cat&&cat!=='all'&&cat!=='custom'){
    lst=lst.filter(e=>{
      // For custom exercises, match by saved cat field
      const cxObj=cx.find(c=>c.name===e[0]);
      if(cxObj&&cxObj.cat)return cxObj.cat===cat;
      const g=e[1];
      if(cat==='mi')return/Quadric|Gl\xfateo|Isquio|Panturrilha|Adutor/.test(g);
      if(cat==='ms')return/Peito|Costa|Dorsal/.test(g);
      if(cat==='ombros')return/Ombro|Delt\xf3ide|Rotador/.test(g);
      if(cat==='bracos')return/B\xedceps|Tr\xedceps/.test(g);
      if(cat==='core')return/Core/.test(g);
      if(cat==='card')return/Cardio|Full body|Kettlebell/.test(g);
      if(cat==='mob')return/Mobilidade|Liberta|Pilates|Ativa/.test(g);
      return false;
    });
  }
  const el=document.getElementById('liblist');if(!el)return;
  const isCustom=e=>cx.some(c=>c.name===e[0]);
  el.innerHTML=lst.length===0?'<div class="empty"><div class="empty-t">Nenhum encontrado.</div></div>':
    lst.map(e=>`<div class="card" style="padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px">

}

  const k=(document.getElementById('sak')||{value:''}).value.trim();
  S.sak(k);closeM('m-settings');
  toast(k?'API Key guardada \u2713':'API Key removida');
}

function clearAll(){
  if(!confirm('Apagar TODOS os dados? Clientes, planos e sess\xf5es ser\xe3o eliminados.'))return;
  ['clients','plans','sessions'].forEach(k=>localStorage.removeItem(K+k));
  closeM('m-settings');toast('Dados eliminados');go(CS);
}
